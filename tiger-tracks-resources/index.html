<style>
:root {
  --primary: #0A1119;
  --accent: #229FA1;
  --accent-light: #1F807E;
  --accent-dark: #1A7477;
  --bg: #0A1119;
  --card-bg: #1B2126;
  --text: #FFFFFF;
  --text-light: #9E9E9E;
  --border: rgba(255,255,255,0.07);
  --panel: #1B2126;
  --success: #229FA1;
  --warning: #f59e0b;
  --danger: #ef4444;
  --info: #1F807E;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
a { color: var(--accent); text-decoration: none; }

/* NAV */
.topnav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(10,17,25,0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  padding: 0 2rem; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 12px rgba(0,0,0,.3); border-bottom: 1px solid rgba(34,159,161,0.1);
}
.topnav .logo { color: var(--accent); font-weight: 400; font-size: 1.5rem; letter-spacing: .5px; font-family: 'DM Serif Display', serif; }
.topnav .logo span { color: #fff; }
.nav-links { display: flex; gap: 1.5rem; overflow: visible; }
.nav-links a { color: #9E9E9E; font-size: 1.05rem; font-weight: 500; transition: color 0.2s; }
.nav-links a:hover { color: #FFFFFF; }
/* Active tab underline with animated width */
.nav-links > a.active, .nav-dropdown > a.active { color: #FFFFFF; }
.nav-links > a.active::after, .nav-dropdown > a.active::after {
  content: ''; display: block; height: 2px; background: #229FA1;
  width: 100%; animation: underlineExpand 0.3s ease forwards;
}
@keyframes underlineExpand { from { width: 0; } to { width: 100%; } }
.nav-dropdown { position: relative; }
.nav-dropdown > a::after { content: ' ▾'; font-size: 0.84rem; }
.nav-dropdown-menu { display: none; position: absolute; top: 100%; right: 0; background: rgba(10,17,25,0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(34,159,161,0.1); border-top: 1px solid rgba(34,159,161,0.2); border-radius: 0 0 8px 8px; min-width: 200px; margin-top: 0; padding-top: 8px; padding-bottom: .5rem; padding-left: 0; padding-right: 0; box-shadow: 0 4px 12px rgba(0,0,0,.3); z-index: 1001; animation: dropdownFadeIn 0.15s ease forwards; }
@keyframes dropdownFadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.nav-dropdown::after { content: ''; position: absolute; top: 100%; left: 0; right: 0; height: 8px; }
.nav-dropdown:hover .nav-dropdown-menu { display: block; }
.nav-dropdown-menu a { display: block; padding: .5rem 1.1rem; font-size: 1.056rem; color: #cbd5e1; white-space: nowrap; }
.nav-dropdown-menu a:hover { color: var(--accent); background: rgba(255,255,255,.05); }
.nav-dropdown-menu .nav-sub { position: relative; }
.nav-dropdown-menu .nav-sub > a::after { content: ' ▸'; font-size: 0.72rem; }
.nav-sub-menu { display: none; position: absolute; left: 100%; top: 0; background: var(--panel); border-radius: 0 8px 8px 0; min-width: 220px; padding: .5rem 0; box-shadow: 0 4px 12px rgba(0,0,0,.3); z-index: 1002; }
.nav-dropdown:last-child .nav-dropdown-menu, .nav-dropdown:nth-last-child(2) .nav-dropdown-menu { right: 0; left: auto; }
.nav-dropdown:last-child .nav-sub-menu, .nav-dropdown:nth-last-child(2) .nav-sub-menu { left: auto; right: 100%; border-radius: 8px 0 0 8px; }
.nav-sub:hover .nav-sub-menu { display: block; }
.nav-sub-menu a { display: block; padding: .4rem 1rem; font-size: 1.008rem; color: #cbd5e1; white-space: nowrap; }
.nav-sub-menu a:hover { color: var(--accent); background: rgba(255,255,255,.05); }
.mobile-toggle { display: none; background: none; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; }

/* HERO */
.hero {
  margin-top: 64px; padding: 4rem 2rem 1.5rem;
  background: #0A1119;
  color: #fff; text-align: center;
  border-bottom: 1px solid rgba(34,159,161,0.12);
  display: flex; flex-direction: column; align-items: center;
}
.hero h1 { font-size: 3.6rem; font-weight: 400; margin-bottom: .5rem; font-family: 'DM Serif Display', serif; line-height: 1.1; }
.hero h1 span { color: var(--accent); }
.hero p { color: #9E9E9E; text-align: center; width: 100%; display: block; margin: 0.5rem 0 0; }

/* LAYOUT */
.container { max-width: 95vw; width: 95vw; margin: 0 auto; padding: 1rem 1.5rem 4rem; }

/* About Tiger Tracks content border */
#org.section, #offerings.section {
  border: 1px solid #1A7477;
  border-radius: 12px;
  padding: 2rem 2rem !important;
}


/* SECTION NAV CARDS */
/* section-grid replaced by universal grid rule below */
.section-card {
  background: var(--card-bg); border-radius: 12px; padding: 1.5rem;
  border: 1px solid var(--border); cursor: pointer; transition: all .2s;
  text-align: center;
}
.section-card:hover { border-color: #229FA1; transform: translateY(-2px); box-shadow: 0 0 20px rgba(34,159,161,0.15); }
.section-card { transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease; }
.section-card .icon { font-size: 2.4rem; margin-bottom: .5rem; }
.section-card h3 { font-size: 1.35rem; font-weight: 700; margin-bottom: .25rem; font-family: Inter, system-ui, sans-serif; color: #FFFFFF; }
.section-card p { font-size: 0.96rem; color: var(--text-light); }

/* SECTIONS */
.section { margin-bottom: 3rem; scroll-margin-top: 80px; }
.section-header {
  display: flex; align-items: center; gap: .75rem;
  margin-bottom: 1.5rem; padding-bottom: .75rem; border-bottom: 2px solid var(--accent);
}
.section-header .emoji { font-size: 2.1rem; }
.section-header h2 { font-size: 2.1rem; font-weight: 400; color: #F4F1EB; font-family: 'DM Serif Display', serif; line-height: 1.1; }

/* CARDS */
.card {
  background: var(--card-bg); border-radius: 12px; padding: 1.75rem;
  border: 1px solid var(--border); margin-bottom: 1.25rem;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
  transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
}
.card:hover { border-color: #229FA1; box-shadow: 0 0 20px rgba(34,159,161,0.15); transform: translateY(-2px); }
.card h3 { font-size: 1.35rem; font-weight: 700; color: #FFFFFF; margin-bottom: .75rem; font-family: Inter, system-ui, sans-serif; }
.card h4 { font-size: 1.14rem; font-weight: 700; color: var(--text); margin: 1rem 0 .5rem; }
.card p, .card li { font-size: 1.08rem; color: var(--text); }
.card ul, .card ol { padding-left: 1.25rem; margin: .5rem 0; }
.card li { margin-bottom: .35rem; }

/* COLLAPSIBLE */
.collapsible { cursor: pointer; user-select: none; }
.collapsible::after { content: ' ▸'; font-size: 0.96rem; color: var(--accent); }
.collapsible.open::after { content: ' ▾'; }
.collapsible-content { display: none; margin-top: .75rem; }
.collapsible-content.show { display: block; }

/* HANDBOOK - uniform subsection spacing + justified text */
#handbook h4.collapsible { margin-top: 1.25rem; margin-bottom: 0; padding-top: 1.25rem; border-top: 1px solid rgba(255,255,255,0.07); }
#handbook h4.collapsible:first-of-type { border-top: none; padding-top: 0; margin-top: .5rem; }
#handbook .collapsible-content { padding-bottom: .25rem; }
#handbook .collapsible-content p,
#handbook .collapsible-content li { text-align: justify; line-height: 1.8; margin-bottom: .5rem; }
#handbook .collapsible-content ul { margin: .5rem 0 .5rem 1.25rem; }

/* ROLE CARDS */
.role-header {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: .5rem;
}
.badge {
  display: inline-block; padding: .2rem .6rem; border-radius: 20px;
  font-size: 0.9rem; font-weight: 600;
}
.badge-revenue { background: rgba(34,159,161,0.15); color: #229FA1; }
.badge-accounts { background: rgba(31,128,126,0.15); color: #1F807E; }
.badge-tier { background: rgba(245,158,11,0.15); color: #f59e0b; }

/* TABLE */
.table-wrap { overflow-x: auto; margin: 1rem 0; }
table { width: 100%; border-collapse: collapse; font-size: 1.02rem; }
th { background: #1B2126; color: #9E9E9E; padding: .6rem .75rem; text-align: left; font-weight: 600; }
td { padding: .6rem .75rem; border-bottom: 1px solid rgba(255,255,255,0.05); background: #0A1119; }
tr:hover td { background: rgba(34,159,161,0.05); }

/* ORG CHART */
.org-tree { padding-left: 0; list-style: none; }
.org-tree li { position: relative; padding-left: 1.5rem; margin: .35rem 0; font-size: 1.08rem; }
.org-tree li::before {
  content: ''; position: absolute; left: 0; top: .6rem;
  width: 1rem; border-bottom: 2px solid var(--accent);
}
.org-tree li::after {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  border-left: 2px solid rgba(255,255,255,0.1);
}
.org-tree li:last-child::after { height: .65rem; }
.org-tree .name { font-weight: 600; }
.org-tree .title { color: var(--text-light); font-size: 0.96rem; }
.org-tree ul { margin-left: .5rem; }

/* TEMPLATE BOX */
.template-box {
  background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.12); border-radius: 12px;
  padding: 1.25rem; margin: .75rem 0; font-size: 1.02rem;
}
.template-box .label { font-weight: 700; color: var(--accent); font-size: 0.9rem; text-transform: uppercase; letter-spacing: .5px; margin-bottom: .5rem; }

/* CALLOUT */
.callout {
  border-left: 4px solid #229FA1; background: #1A7477; color: #F4F1EB;
  padding: 1rem 1.25rem; border-radius: 0 12px 12px 0; margin: 1rem 0;
  font-size: 1.08rem;
}
.callout.blue { border-left: 4px solid #1F807E; background: #1B2126; color: #F4F1EB; }
.callout.green { border-left: 4px solid #229FA1; background: #1A7477; color: #F4F1EB; }
.callout.red { border-left: 4px solid #ef4444; background: #F4F1EB; color: #1A1A1A; }

/* STEPS */
.steps { counter-reset: step; list-style: none; padding: 0; }
.steps li {
  counter-increment: step; position: relative; padding-left: 2.5rem; margin-bottom: 1rem;
}
.steps li::before {
  content: counter(step); position: absolute; left: 0; top: 0;
  width: 1.75rem; height: 1.75rem; border-radius: 50%;
  background: var(--accent); color: #fff; font-weight: 700; font-size: 0.96rem;
  display: flex; align-items: center; justify-content: center;
}

/* PRINT */
.print-btn {
  display: inline-flex; align-items: center; gap: .4rem;
  background: linear-gradient(135deg, #1F807E, #1A7477); color: #fff; border: none; padding: .5rem 1rem;
  border-radius: 8px; font-size: 1.02rem; font-weight: 600; cursor: pointer;
  transition: background .2s;
}
.print-btn:hover { opacity: .9; }

/* BACK TO TOP */
.back-top {
  position: fixed; bottom: 2rem; right: 2rem; width: 44px; height: 44px;
  border-radius: 50%; background: var(--accent); color: #fff; border: none;
  font-size: 1.5rem; cursor: pointer; display: none; align-items: center;
  justify-content: center; box-shadow: 0 4px 12px rgba(0,0,0,.15);
  transition: opacity .2s;
}
.back-top.show { display: flex; }

/* SEARCH */
.search-wrap { max-width: 400px; margin: 0 auto 1rem; position: relative; }
.search-wrap input {
  width: 100%; padding: .65rem 1rem .65rem 2.5rem; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; font-size: 1.08rem; background: rgba(255,255,255,0.05); color: #FFFFFF;
}
.search-wrap input::placeholder { color: #9E9E9E; }
.search-wrap input:focus { outline: none; border-color: #229FA1; box-shadow: 0 0 0 3px rgba(34,159,161,0.15); }
.search-wrap::before { content: '🔍'; position: absolute; left: .75rem; top: 50%; transform: translateY(-50%); font-size: 1.08rem; }

/* RESPONSIVE */
@media (max-width: 768px) {
  /* Bento grid: single column on mobile */
  #bento-grid { grid-template-columns: 1fr !important; }
  #bento-grid > div { grid-column: span 1 !important; }

  /* Section padding */
  .section { padding: 1.5rem 1rem; }

  /* Nav: collapse properly */
  .topnav { padding: 0 1rem; }
  .nav-links { display: none; flex-direction: column; position: fixed; top: 64px; left: 0; right: 0; background: #0A1119; padding: 1rem; z-index: 999; }
  .nav-links.open { display: flex; }
  .nav-dropdown-menu { position: static; box-shadow: none; display: none; padding-left: 1rem; }
  .nav-dropdown.open .nav-dropdown-menu { display: block; }
  .nav-dropdown:hover .nav-dropdown-menu { display: none; }
  .nav-dropdown.open:hover .nav-dropdown-menu { display: block; }
  .nav-sub-menu { position: static; box-shadow: none; padding-left: 1rem; display: none; }
  .nav-sub:hover .nav-sub-menu { display: none; }
  .nav-sub.open .nav-sub-menu { display: block; }
  .mobile-toggle { display: block; }
  /* section-grid responsive handled by universal grid */

  /* Tables: horizontal scroll */
  table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* Hero */
  .hero h1 { font-size: 2.1rem; }

  /* Cards */
  .card { padding: 1rem; }
}

@media (max-width: 480px) {
  #bento-grid { gap: .75rem !important; }
  .section { padding: 1.25rem .75rem; }
}
/* REVIEWS */
.rv-label { display:block;font-size:0.96rem;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.25rem; }
.rv-input { width:100%;padding:.5rem .75rem;border:1px solid rgba(255,255,255,0.1);border-radius:8px;font-family:Inter,system-ui,sans-serif;font-size:1.08rem;margin-top:.25rem;background:rgba(255,255,255,0.05);color:#FFFFFF; }
.rv-input::placeholder { color:#9E9E9E; }
.rv-input:focus { outline:none;border-color:#229FA1;box-shadow:0 0 0 3px rgba(34,159,161,0.15); }
.rv-input-sm { width:100%;padding:.4rem .6rem;border:1px solid rgba(255,255,255,0.1);border-radius:6px;font-family:Inter,system-ui,sans-serif;font-size:0.996rem;background:rgba(255,255,255,0.05);color:#FFFFFF; }
.rv-input-sm::placeholder { color:#9E9E9E; }
.rv-input-sm:focus { outline:none;border-color:#229FA1;box-shadow:0 0 0 3px rgba(34,159,161,0.15); }
.rv-textarea { width:100%;padding:.5rem .75rem;border:1px solid rgba(255,255,255,0.1);border-radius:8px;font-family:Inter,system-ui,sans-serif;font-size:1.02rem;resize:vertical;background:rgba(255,255,255,0.05);color:#FFFFFF; }
.rv-textarea::placeholder { color:#9E9E9E; }
.rv-textarea:focus { outline:none;border-color:#229FA1;box-shadow:0 0 0 3px rgba(34,159,161,0.15); }
.rv-tab { padding:.5rem 1.25rem;border-radius:8px;border:1px solid var(--border);background:var(--card-bg);font-family:Inter,system-ui,sans-serif;font-size:1.02rem;font-weight:600;cursor:pointer;transition:all .15s;color:#9E9E9E; }
.rv-tab:hover { border-color:var(--accent);color:var(--accent); }
.rv-tab.active { background:linear-gradient(135deg,#1F807E,#1A7477);color:#fff;border-color:#1F807E; }
.rv-radio, .rv-check { display:inline-flex;align-items:center;gap:.35rem;font-size:1.02rem;cursor:pointer;padding:.25rem .5rem;border-radius:6px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#FFFFFF; }
.rv-radio:hover, .rv-check:hover { border-color:var(--accent); }
.rv-status { display:inline-block;padding:.15rem .5rem;border-radius:12px;font-size:0.84rem;font-weight:700;text-transform:uppercase; }
.rv-status.draft { background:rgba(245,158,11,0.15);color:#f59e0b; }
.rv-status.submitted { background:rgba(34,159,161,0.15);color:#229FA1; }
.history-item { display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border:1px solid var(--border);border-radius:12px;margin-bottom:.5rem;cursor:pointer;transition:all .15s;background:var(--card-bg); }
.history-item:hover { border-color:var(--accent);background:rgba(34,159,161,0.05); }

/* BENTO HOVER */
#bento-grid [onclick]:hover { background:#1A7477!important; box-shadow:0 0 24px rgba(34,159,161,0.2)!important; }
/* Org chart: wider override */
#org.section { max-width: 98vw; width: 98vw; }

/* Section fade-in transition */
.section {
  animation: sectionFadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}
@keyframes sectionFadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Bento grid fade-in */
#bento-grid {
  animation: sectionFadeIn 0.25s ease forwards;
}

/* Hardware acceleration hint */
.section, #bento-grid {
  will-change: opacity, transform;
}

/* Bento tile hover enhancements */
#bento-grid > div {
  transition: background 0.25s ease, box-shadow 0.25s ease, transform 0.2s ease, border-color 0.25s ease;
}
#bento-grid > div:hover {
  background: #1A7477 !important;
  box-shadow: 0 8px 32px rgba(34,159,161,0.18), 0 0 0 1px #229FA1;
  transform: translateY(-3px);
}

/* Breathing room everywhere */
.section { padding: 2.5rem 2rem; max-width: 95vw; width: 95vw; margin: 0 auto; }
.section-header { margin-bottom: 2rem; }
.card { padding: 1.5rem; margin-bottom: 1.25rem; line-height: 1.7; }
.callout { padding: 1.25rem 1.5rem; line-height: 1.75; margin-bottom: 1.5rem; }

/* Font hierarchy */
h1, h2 { font-family: 'DM Serif Display', serif; font-weight: 400; letter-spacing: -0.3px; }
h3 { font-family: Inter, system-ui, sans-serif; font-size: 1.35rem; font-weight: 700; color: #FFFFFF; }
h4 { font-family: Inter, system-ui, sans-serif; font-weight: 700; font-size: 1.08rem; color: #F4F1EB; text-transform: uppercase; letter-spacing: 0.15em; }
p, li, td, label { font-family: Inter, system-ui, sans-serif; font-size: 1.125rem; line-height: 1.5; color: #A1A1A1; }

/* Table improvements */
table { border-collapse: collapse; width: 100%; border-radius: 10px; overflow: hidden; }
th { background: #1B2126; color: #9E9E9E; font-family: Inter, system-ui, sans-serif; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.15em; padding: .75rem 1rem; }
td { padding: .7rem 1rem; font-size: 1.056rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
tr:hover td { background: rgba(34,159,161,0.06); }

/* Cards */
.card { border-radius: 12px; border: 1px solid rgba(255,255,255,0.07); }
.card:hover { border-color: rgba(34,159,161,0.3); box-shadow: 0 4px 20px rgba(34,159,161,0.1); }

/* Buttons */
button, .btn-primary { border-radius: 8px; font-family: Inter, system-ui, sans-serif; font-weight: 600; transition: all 0.2s ease; }

/* Gradient callouts */
.callout {
  background: linear-gradient(135deg, rgba(34,159,161,0.08), rgba(26,116,119,0.05));
  border-left: 3px solid #229FA1;
  border-radius: 0 10px 10px 0;
}
.callout.red {
  background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(239,68,68,0.08));
  border-left: 3px solid #ef4444;
  color: #FFFFFF;
}

/* Light-background box text fix: override global #F4F1EB default for children */
[style*="background:#F4F1EB"] h1,
[style*="background:#F4F1EB"] h2,

  function populateReviewerInfo(tier) {
    var sel = document.getElementById('rvRoleSelect');
    var opt = sel ? sel.options[sel.selectedIndex] : null;
    var roleLabel = (opt && tier) ? opt.textContent.trim() : '';
    var wh = document.getElementById('rv-weekly-header');
    var mh = document.getElementById('rv-monthly-header');
    var wc = document.getElementById('rv-weekly-col');
    var mc = document.getElementById('rv-monthly-col');
    var placeholder = '<p style="color:#9E9E9E;font-family:Inter,system-ui,sans-serif;font-size:1.02rem;padding:.5rem 0;">Select your role above to see your questions.</p>';

    if (tier && RV_QUESTIONS[tier]) {
      var qs = RV_QUESTIONS[tier];
      if (wh) wh.textContent = 'Weekly Sync — ' + roleLabel;
      if (mh) mh.textContent = 'Monthly Review — ' + roleLabel;
      if (wc) wc.innerHTML = rvRenderQuestions(qs.weekly);
      if (mc) mc.innerHTML = rvRenderQuestions(qs.monthly);
    } else {
      if (wh) wh.textContent = 'Weekly Syncs';
      if (mh) mh.textContent = 'Monthly Feedback Reviews';
      if (wc) wc.innerHTML = placeholder;
      if (mc) mc.innerHTML = placeholder;
    }
  }
  window.populateReviewerInfo = populateReviewerInfo;
  window.rvRenderQuestions = rvRenderQuestions;
  // ── end Meeting Agendas ───────────────────────────────────────────────────


  // ── Show-all sub-tabs when navigating to a parent section ─────────────────
  var SECTION_TAB_MAP = {
    'culture':       { cls: 'cul-tab-content' },
    'best-practices':{ cls: 'bp-tab-content' },
    'benefits':      { cls: 'ben-tab-content', landing: 'ben-landing' },
    'bonuses':       { cls: 'bonus-tab-content' },
    'invoicing':     { ids: ['inv-ar','inv-process'] },
    'org':           { ids: ['org-pyramid'] }
  };

  function showAllTabs(sectionId) {
    var map = SECTION_TAB_MAP[sectionId];
    if (!map) return;
    // Show landing page if defined, hide tab content
    if (map.landing) {
      var landing = document.getElementById(map.landing);
      if (landing) landing.style.display = '';
      if (map.cls) document.querySelectorAll('.' + map.cls).forEach(function(el){ el.style.display = 'none'; });
      return;
    }
    var section = document.getElementById(sectionId);
    if (!section) return;
    // Show all tab-content panels
    if (map.cls) {
      section.querySelectorAll('.' + map.cls).forEach(function(p) { p.style.display = 'block'; });
    }
    if (map.ids) {
      map.ids.forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.style.display = 'block';
      });
    }
    // Hide tab-bar rows (redundant when all content is stacked)
    section.querySelectorAll('.tab-bar, .tab-row, .tab-nav').forEach(function(b) {
      b.style.display = 'none';
    });
  }
  window.showAllTabs = showAllTabs;
  // ── end show-all tabs ─────────────────────────────────────────────────────

  // ── SPA Navigation (runs in index.html scope — guaranteed reliable) ──────
  var _navReady = false;
  function navigateTo(sectionId) {
    var navCards = document.getElementById('bento-grid');
    var searchWrap = document.getElementById('cmd-bar-wrap');
    var allSections = document.querySelectorAll('#app-root .section');
    var homeBackBtn = document.getElementById('home-back-btn');

    if (!navCards) return; // app not loaded yet

    // Redirect removed sections to their new homes
    if (sectionId === 'feedback') {
      navigateTo('culture');
      setTimeout(function(){ var el=document.getElementById('cul-feedback'); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); },150);
      return;
    }

    if (sectionId === 'home') {
      navCards.style.display = '';
      if (searchWrap) searchWrap.style.display = '';
      if (homeBackBtn) homeBackBtn.style.display = 'none';
      // Reset hero padding for home
      var heroEl = document.querySelector('.hero');
      if (heroEl) heroEl.style.padding = '';
      var containerEl = document.querySelector('.container');
      if (containerEl) containerEl.style.paddingTop = '';

      allSections.forEach(function(s) { s.style.display = 'none'; });
      var heroP = document.querySelector('.hero p');
      if (heroP) heroP.textContent = 'Tiger Tracks · Internal Platform';
      window.scrollTo({top:0, behavior:'smooth'});
      history.pushState(null, '', window.location.pathname);
      var cmdBar = document.getElementById('cmdBar');
      if (cmdBar) cmdBar.value = '';
      document.querySelectorAll('#app-root .card').forEach(function(c) { c.style.display = ''; });
      setTimeout(revealTiles, 50);
    } else {
      if (navCards) navCards.style.display = 'none';
      if (homeBackBtn) homeBackBtn.style.display = 'flex';
      // Compact hero for section view
      var heroEl = document.querySelector('.hero');
      if (heroEl) heroEl.style.padding = '2rem 2rem .75rem';
      // Cut space from hero to section content in half
      var containerEl = document.querySelector('.container');
      if (containerEl) containerEl.style.paddingTop = '1rem';

      allSections.forEach(function(s) {
        if (s.id === sectionId) {
          s.style.animation = 'none';
          s.style.display = 'block';
          s.offsetHeight;
          s.style.animation = '';
          // Show all sub-tab panels stacked
          showAllTabs(sectionId);
          // Good Standing: always open collapsibles on navigation
          if (sectionId === 'culture') {
            var standingEl = document.getElementById('cul-standing');
            if (standingEl) {
              standingEl.querySelectorAll('.collapsible-content').forEach(function(el) { el.style.display = 'block'; });
              standingEl.querySelectorAll('.collapsible').forEach(function(el) { el.classList.add('open'); });
            }
          }
        } else {
          s.style.display = 'none';
        }
      });
      var sectionHeader = document.querySelector('#' + sectionId + ' .section-header h2');
      var heroP = document.querySelector('.hero p');
      if (sectionHeader && heroP) heroP.textContent = sectionHeader.textContent;
      window.scrollTo({top: 0});
      history.pushState(null, '', '#' + sectionId);
      var cmdBar = document.getElementById('cmdBar');
      if (cmdBar) cmdBar.value = '';
      document.querySelectorAll('#app-root .card').forEach(function(c) { c.style.display = ''; });
    }
  }
  // Make navigateTo global for inline onclick attrs
  window.navigateTo = navigateTo;

  function revealTiles() {
    var tiles = document.querySelectorAll('.tile');
    tiles.forEach(function(tile, i) {
      setTimeout(function() { tile.classList.add('revealed'); }, i * 50);
    });
  }
  window.revealTiles = revealTiles;

  function initNavigation() {
    // Create back button if not already present
    var navCards = document.getElementById('bento-grid');
    if (!document.getElementById('home-back-btn')) {
      var btn = document.createElement('button');
      btn.id = 'home-back-btn';
      btn.className = 'print-btn';
      btn.style.cssText = 'display:none;margin:1rem auto 0;width:fit-content;background:rgba(27,33,38,0.8);border:1px solid rgba(34,159,161,0.3);color:#F4F1EB;font-family:Inter,system-ui,sans-serif;font-size:1.02rem;padding:.5rem 1.25rem;border-radius:8px;cursor:pointer;';
      btn.innerHTML = '← Back to Home';
      btn.onclick = function() { navigateTo('home'); };
      // Insert inside the hero inner div, after cmd-bar-wrap
      var cmdBarWrap = document.getElementById('cmd-bar-wrap');
      if (cmdBarWrap && cmdBarWrap.parentNode) {
        cmdBarWrap.parentNode.appendChild(btn);
      } else if (navCards) {
        navCards.parentNode.insertBefore(btn, navCards.nextSibling);
      }
    }

    // Hide all sections, show home
    var allSections = document.querySelectorAll('#app-root .section');
    allSections.forEach(function(s) { s.style.display = 'none'; });

    // Mobile nav dropdowns
    document.querySelectorAll('.nav-dropdown > a').forEach(function(a) {
      a.addEventListener('click', function(e) {
        if (window.innerWidth <= 768) {
          e.preventDefault();
          this.parentElement.classList.toggle('open');
        }
      });
    });

    // Close nav on click
    document.querySelectorAll('.topnav a').forEach(function(a) {
      a.addEventListener('click', function() {
        var nl = document.querySelector('.nav-links');
        if (nl) setTimeout(function() { nl.classList.remove('open'); }, 200);
        document.querySelectorAll('.nav-dropdown').forEach(function(d) { d.classList.remove('open'); });
      });
    });

    // Search
    var cmdBar = document.getElementById('cmdBar');
    if (cmdBar) {
      cmdBar.addEventListener('input', function() {
        var q = this.value.toLowerCase();
        var activeSection = document.querySelector('#app-root .section[style*="display: block"]');
        var cards = activeSection ? activeSection.querySelectorAll('.card') : document.querySelectorAll('#app-root .card');
        cards.forEach(function(card) {
          card.style.display = card.textContent.toLowerCase().includes(q) || !q ? '' : 'none';
        });
      });
    }

    // ⌘K shortcut
    document.addEventListener('keydown', function(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        var bar = document.getElementById('cmdBar');
        if (bar) { bar.focus(); bar.select(); }
      }
    });

    // Back/forward
    window.addEventListener('popstate', function() {
      var hash = window.location.hash.substring(1);
      navigateTo(hash && document.getElementById(hash) ? hash : 'home');
    });

    // Back to top
    window.addEventListener('scroll', function() {
      var bt = document.getElementById('backTop');
      if (bt) bt.classList.toggle('show', window.scrollY > 400);
    });

    // Reveal tiles on home
    setTimeout(revealTiles, 100);
    _navReady = true;
  }

  // ── end SPA Navigation ────────────────────────────────────────────────────

  function loadApp(sessToken) {
    var loader = document.getElementById('app-loading');
    var root   = document.getElementById('app-root');
    document.getElementById('password-gate').style.display = 'none';
    if (loader) loader.style.display = 'block';
    fetch('/api/data', { headers: { 'Authorization': 'Bearer ' + sessToken } })
      .then(function(r) {
        if (r.status === 401 || r.status === 403) {
          clearSession();
          showGate('@tigertracks.ai access required.');
          return null;
        }
        return r.json();
      })
      .then(function(data) {
        if (!data) return;
        if (loader) loader.style.display = 'none';
        root.innerHTML = data.html;
        var s = document.createElement('script');
        s.src = '/api/scripts?v=' + Date.now();
        s.onload = function() {
          initNavigation();
          initAppScripts();
          if (location.hash) {
            var id = location.hash.substring(1);
            setTimeout(function() { navigateTo(id); }, 100);
          }
        };
        document.head.appendChild(s);
      })
      .catch(function() { showGate('Network error. Please refresh.'); });
  }

  // ── exchange Google ID token for session token ─────────────────────────
  function exchangeToken(googleCredential) {
    return fetch('/api/session', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + googleCredential, 'Content-Type': 'application/json' }
    })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(data) {
      if (!data || !data.sessionToken) return null;
      localStorage.setItem(SESS_KEY, data.sessionToken);
      localStorage.setItem(EMAIL_KEY, data.email);
      localStorage.setItem(EXP_KEY, String(data.exp));
      return data.sessionToken;
    });
  }

  // ── GSI callback ───────────────────────────────────────────────────────
  window.handleResourcesLogin = function(response) {
    var errEl = document.getElementById('gate-error');
    if (errEl) errEl.style.display = 'none';
    document.getElementById('gate-spinner').style.display = 'block';
    document.getElementById('gate-btn-area').style.display = 'none';
    try {
      var parts   = response.credential.split('.');
      var payload = JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
      var email   = (payload.email || '').toLowerCase();
      if (!email.endsWith('@tigertracks.ai')) {
        if (errEl) { errEl.textContent = 'Access denied. @tigertracks.ai required.'; errEl.style.display = 'block'; }
        document.getElementById('gate-spinner').style.display = 'none';
        document.getElementById('gate-btn-area').style.display = 'block';
        return;
      }
      // Exchange for server-signed session token
      exchangeToken(response.credential).then(function(sessToken) {
        if (!sessToken) { showGate('Sign-in failed. Please try again.'); return; }
        loadApp(sessToken);
      });
    } catch(e) {
      if (errEl) { errEl.textContent = 'Sign-in error. Please try again.'; errEl.style.display = 'block'; }
      document.getElementById('gate-spinner').style.display = 'none';
      document.getElementById('gate-btn-area').style.display = 'block';
    }
  };

  // ── on page load ───────────────────────────────────────────────────────
  // Hide spinner by default until we know we need it
  document.getElementById('gate-spinner').style.display = 'none';

  if (hasSession()) {
    // Returning user — load app immediately with stored session token
    loadApp(getSess());
  } else {
    // New user or expired session — show sign-in button
    waitForGSI(function() {
      google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback:  handleResourcesLogin,
        cancel_on_tap_outside: false
      });
      google.accounts.id.renderButton(
        document.getElementById('gate-btn-area'),
        { type:'standard', size:'large', theme:'filled_black', text:'sign_in_with', shape:'rectangular', logo_alignment:'left' }
      );
    });
  }
})();
</script>
